{% extends 'base.html' %}

{% block content %}

<h2>My Wishlist</h2>

{% for item in wishlist %}
    <div>
        <h3>{{ item.product.name }}</h3>
        <p>₹{{ item.product.price }}</p>

        {% if item.product.images.first %}
            <img  src="{{ item.product.images.first.image.url }}"  width="150" >
        {% endif %}
        <br>
        <a href="/products/{{ item.product.id }}/" style="text-decoration: none;  ">Click to View</a><br><br>
        <a href="/wishlist/remove/{{ item.product.id }}/"  class="remove">Remove from Wishlist</a>
    </div>
{% empty %}
    <p>No items in wishlist</p>
{% endfor %}

<style>
    .remove{
    background:black;
    color:white;
    padding:5px 15px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.remove:hover{
    background:#333;
}
</style>

{% endblock %}
