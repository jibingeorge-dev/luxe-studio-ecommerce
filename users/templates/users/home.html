{% extends 'base.html' %}


{% block fullwidth %}
<div class="category-bar">
    <a href="/home/" class="cat-link {% if not request.GET.category %}active{% endif %}">All</a>
    <a href="/home/?category=makeup" class="cat-link {% if request.GET.category == 'makeup' %}active{% endif %}">Makeup</a>
    <a href="/home/?category=dress" class="cat-link {% if request.GET.category == 'dress' %}active{% endif %}">Clothing</a>
    
</div>
{% endblock %}

{% block content %}
<div class="product-grid">
{% for product in products %}

<div class="card" onclick="window.location.href='/products/{{ product.id }}/'">

    {% if product.images.first %}
        <img src="{{ product.images.first.image.url }}">
    {% endif %}

   <div class="card-content">
    <h3>{{ product.name }}</h3>
    <p class="desc">{{ product.description }}</p>
    </div>

    <div class="card-bottom">
    <p class="price">Rs.{{ product.price }}</p>

    <button class="wishlist-btn"
        id="wish-{{ product.id }}"
        onclick="toggleWishlist('{{ product.id }}', event)">
        
        {% if product.id in wishlist_items %}
            ❤️ Wishlisted
        {% else %}
            🤍 Wishlist
        {% endif %}
    </button>
    </div>

</div>

{% endfor %}
</div>

<script>
function toggleWishlist(productId, event) {
    event.stopPropagation();

    fetch(`/wishlist/toggle/${productId}/`)
    .then(res => res.json())
    .then(data => {
        const btn = document.getElementById(`wish-${productId}`);
        btn.innerHTML = data.status === "added"
            ? "❤️ Wishlisted"
            : "🤍 Wishlist";
    });
}
</script>

{% endblock %}
